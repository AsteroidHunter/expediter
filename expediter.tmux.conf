# expediter.tmux.conf — opt-in tmux styling for Expediter users.
#
# Sourced from ~/.tmux.conf via `source-file` when the user opts in during
# install.sh. Anything here should work with a plain `brew install tmux` and
# require no plugins, fonts, or external scripts.

# Mouse + clipboard
set -g mouse on
set -g set-clipboard on

# vi-style copy mode; drag-select auto-copies to the macOS system clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Larger scrollback, sane indices, snappy escape
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# Pane borders: heavy lines, centered title, green highlight on active pane
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-format "#[align=centre]#{?pane_active,#[bg=#007200#,fg=#fffdf5#,bold],#[reverse#,bold]} #{pane_index} · #{b:pane_current_path} · #{pane_title} #[default]"
set -g pane-border-style "fg=colour244"
set -g pane-active-border-style "fg=#007200,bold"

# Terminal title (shown in your terminal app's title bar)
set -g set-titles on
set -g set-titles-string "#S · #W · #{pane_title}"

# Bottom status bar — green theme, session/window/pane info on the left, clock on the right
set -g status-style "bg=#007200,fg=#fffdf5"
set -g status-interval 30
set -g status-left-length 120
set -g status-right-length 60
set -g status-left " Session: #S | Window #I: #{pane_current_command} | Pane: #{pane_title} "
set -g status-right " %H:%M "
set -g window-status-format ""
set -g window-status-current-format ""

# Splits open in the current pane's working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config (uses the user's main ~/.tmux.conf, which source-files this one)
bind r source-file ~/.tmux.conf \; display "Reloaded!"
